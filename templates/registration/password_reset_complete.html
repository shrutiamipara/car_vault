{% extends 'base.html' %}
{% block title %}Password Reset Complete | Vehicle Vault{% endblock %}

{% block content %}
<style>
  /* --- Ultra-Smooth Cinematic Pan --- */
  @keyframes cinematicPan {
    0% { transform: scale(1.0) translateX(0); }
    50% { transform: scale(1.05) translateX(-1%); }
    100% { transform: scale(1.0) translateX(0); }
  }

  /* --- Satisfying Success Pulse --- */
  @keyframes successPulse {
    0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
    70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }

  /* --- Full Screen Auth Layout --- */
  .auth-hero {
    position: relative;
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    overflow: hidden;
  }

  .auth-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    /* Moody, high-end car interior background */
    background: url('https://images.unsplash.com/photo-1549399542-7e3f8b79c341?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    z-index: 1;
    animation: cinematicPan 60s ease-in-out infinite;
    will-change: transform;
  }

  .auth-hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(2, 6, 23, 0.90) 0%, rgba(2, 6, 23, 0.98) 100%);
    z-index: 2;
  }

  .auth-card {
    background: #ffffff;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    width: 100%;
    max-width: 500px;
    padding: 50px 40px;
    position: relative;
    z-index: 3;
    text-align: center;
    border-top: 5px solid #10b981; /* Success Green Accent */
  }

  /* --- Iconography & Text --- */
  .success-icon-wrapper {
    width: 80px;
    height: 80px;
    background: #f0fdf4;
    border: 2px solid #bbf7d0;
    color: #10b981;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 25px auto;
    animation: successPulse 2s infinite;
  }

  .auth-card h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .auth-card p {
    color: #64748b;
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 35px;
    font-weight: 500;
  }

  /* --- Premium Button --- */
  .btn-login-custom {
    background-color: #0f172a;
    color: #fff;
    font-weight: 800;
    padding: 16px 20px;
    border-radius: 12px;
    border: none;
    transition: all 0.3s ease;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 1.05rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(15, 23, 42, 0.2);
  }

  .btn-login-custom:hover {
    background-color: #e11d48; /* Red hover for brand consistency */
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(225, 29, 72, 0.3);
    color: #fff;
  }
</style>

<section class="auth-hero">
  <div class="auth-card reveal">
    
    <div class="success-icon-wrapper">
      <i class="fa-solid fa-shield-check"></i>
    </div>
    
    <h1>Access Restored</h1>
    
    <p>Your password has been securely updated. You can now log back into your Vehicle Vault dashboard.</p>
    
    <a href="{% url 'login' %}" class="btn-login-custom">
      <i class="fa-solid fa-right-to-bracket me-2"></i> Sign In to Account
    </a>
    
  </div>
</section>

{% endblock %}
