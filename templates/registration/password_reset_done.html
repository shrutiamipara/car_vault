{% extends 'base.html' %}
{% block title %}Email Sent | Vehicle Vault{% endblock %}

{% block content %}
<style>
  /* --- Ultra-Smooth Cinematic Pan --- */
  @keyframes cinematicPan {
    0% { transform: scale(1.0) translateX(0); }
    50% { transform: scale(1.05) translateX(-1%); }
    100% { transform: scale(1.0) translateX(0); }
  }

  /* --- Gentle Floating Animation for Email Icon --- */
  @keyframes floatEmail {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
  }

  /* --- Full Screen Auth Layout --- */
  .auth-hero {
    position: relative;
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    overflow: hidden;
  }

  .auth-hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    /* Moody, high-end automotive background */
    background: url('https://images.unsplash.com/photo-1494976388531-d1058494cdd8?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    z-index: 1;
    animation: cinematicPan 60s ease-in-out infinite;
    will-change: transform;
  }

  .auth-hero::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(2, 6, 23, 0.90) 0%, rgba(2, 6, 23, 0.98) 100%);
    z-index: 2;
  }

  .auth-card {
    background: #ffffff;
    border-radius: 20px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    width: 100%;
    max-width: 500px;
    padding: 50px 40px;
    position: relative;
    z-index: 3;
    text-align: center;
    border-top: 5px solid #e11d48; /* Signature Crimson Red Accent */
  }

  /* --- Iconography & Text --- */
  .email-icon-wrapper {
    width: 80px;
    height: 80px;
    background: #fff1f2; /* Soft red background */
    border: 2px solid #ffe4e6;
    color: #e11d48;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 25px auto;
    animation: floatEmail 3s ease-in-out infinite;
    box-shadow: 0 10px 25px rgba(225, 29, 72, 0.15);
  }

  .auth-card h1 {
    font-size: 2rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .auth-card p {
    color: #64748b;
    font-size: 1.05rem;
    line-height: 1.6;
    margin-bottom: 15px;
    font-weight: 500;
  }

  .spam-notice {
    font-size: 0.85rem;
    color: #94a3b8;
    background: #f8fafc;
    padding: 10px 15px;
    border-radius: 8px;
    margin-bottom: 35px;
    border: 1px solid #e2e8f0;
  }

  /* --- Premium Button --- */
  .btn-return-custom {
    background-color: transparent;
    color: #0f172a;
    border: 2px solid #cbd5e1;
    font-weight: 800;
    padding: 14px 20px;
    border-radius: 12px;
    transition: all 0.3s ease;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }

  .btn-return-custom:hover {
    background-color: #0f172a;
    border-color: #0f172a;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
  }
</style>

<section class="auth-hero">
  <div class="auth-card reveal">
    
    <div class="email-icon-wrapper">
      <i class="fa-regular fa-envelope-open"></i>
    </div>
    
    <h1>Check Your Inbox</h1>
    
    <p>If an account exists for that address, a secure reset link has been sent your way.</p>
    
    <div class="spam-notice">
      <i class="fa-solid fa-circle-info me-1"></i> Don't see it? Please check your spam or promotions folder.
    </div>
    
    <a href="{% url 'login' %}" class="btn-return-custom">
      <i class="fa-solid fa-arrow-left me-2"></i> Return to Login
    </a>
    
  </div>
</section>

{% endblock %}
