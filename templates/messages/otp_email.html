<table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f1f5f9; padding: 40px 20px; width: 100%; height: 100%;">
  <tr>
    <td align="center" valign="top">
      
      <table width="600" cellpadding="0" cellspacing="0" border="0" align="center" style="background-color:#ffffff; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; box-shadow: 0 20px 40px rgba(0,0,0,0.08); margin: 0 auto;">
        
        <tr>
          <td style="height: 6px; background-color: #e11d48; line-height: 6px; font-size: 6px;">&nbsp;</td>
        </tr>
        
        <tr>
          <td style="padding: 30px 30px 0 30px; text-align: center;">
            <img src="https://cdn-icons-png.flaticon.com/512/681/681494.png" width="56" height="56" alt="Shield" style="display:block;margin:0 auto 10px;">
            <h1 style="margin: 0; font-size: 24px; color: #0f172a;">Verify Your Email</h1>
            <p style="margin: 8px 0 0 0; color: #64748b; font-size: 14px;">
              Enter this 6‑digit code to activate your account.
            </p>
          </td>
        </tr>
        
        <tr>
          <td style="padding: 20px 30px; text-align: center;">
            <div style="display:inline-block; font-size: 28px; letter-spacing: 8px; font-weight: 800; color: #0f172a; padding: 14px 20px; border: 2px dashed #e2e8f0; border-radius: 12px;">
              {{ otp }}
            </div>
            <p style="margin: 12px 0 0 0; color: #94a3b8; font-size: 12px;">This code expires in 15 minutes.</p>
          </td>
        </tr>
        
        <tr>
          <td style="padding: 0 30px 30px 30px; text-align: center;">
            <a href="{{ site_url }}login/" style="display: inline-block; background-color: #e11d48; color: #ffffff; font-size: 15px; font-weight: bold; text-decoration: none; padding: 12px 26px; border-radius: 8px; letter-spacing: 0.5px;">
              Go to Login
            </a>
          </td>
        </tr>
        
      </table>
      
    </td>
  </tr>
</table>
